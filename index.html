<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panther SaaS Pro</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- AUTH -->
<div id="auth">
  <div class="card">
    <h2>🐆 Panther SaaS</h2>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Entrar</button>
    <button onclick="register()">Registro</button>
    <button onclick="recover()">Recuperar</button>

    <p id="msg"></p>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <h3 id="roleTitle"></h3>

    <button onclick="showCalendar()">Calendario</button>
    <button onclick="showResources()">Tatuadores</button>
    <button onclick="showClients()">Clientes</button>
    <button onclick="showPayments()">Pagos</button>
  </div>

  <div id="content"></div>
</div>

<script src="app.js"></script>
</body>
</html>
