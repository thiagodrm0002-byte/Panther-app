<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panther SaaS Pro</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- LOGIN -->
<div id="auth" class="center">
  <div class="loginCard">
    <h2>🐆 Panther SaaS</h2>

    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Entrar</button>
    <button onclick="register()">Registro</button>
    <button onclick="recover()">Recuperar</button>

    <p id="msg"></p>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <h2 id="title"></h2>

    <div class="menu">
      <button onclick="renderCalendar()">📅 Turnos</button>
      <button onclick="renderClients()">👤 Clientes</button>
      <button onclick="renderPayments()">💰 Pagos</button>
      <button onclick="renderFilters()">🔎 Filtros</button>
    </div>
  </div>

  <div id="content"></div>
</div>

<script src="app.js"></script>

</body>
</html>
