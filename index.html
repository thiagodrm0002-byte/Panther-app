<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panther SaaS Pro</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0a0a0a;
  color:#f5c542;
  text-align:center;
}

#app{display:none;}

button{
  padding:10px;
  margin:5px;
  border-radius:10px;
  border:none;
  background:#1c1c1c;
  color:#f5c542;
  cursor:pointer;
}

button:hover{background:#333;}

input, select{
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
}

.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
  padding:10px;
}

.day{
  background:#1c1c1c;
  padding:15px;
  border-radius:10px;
  cursor:pointer;
}

.card{
  background:#1c1c1c;
  margin:10px auto;
  width:80%;
  padding:15px;
  border-radius:10px;
  text-align:left;
}

.pending{color:#f5c542;}
.booked{color:#ff4d4d;}
.ok{color:#4dff88;}

.tabs{
  display:flex;
  gap:10px;
  justify-content:center;
  margin:10px;
}
</style>
</head>

<body>

<h1>🐆 PANTHER SAAS</h1>

<!-- AUTH -->
<div id="login">

  <h2>Login / Registro</h2>

  <input id="email" placeholder="Email"><br>
  <input id="password" type="password" placeholder="Password"><br>

  <button onclick="auth()">Entrar</button>
  <button onclick="resetPassword()">Recuperar contraseña</button>

  <p id="msg"></p>
</div>

<!-- APP -->
<div id="app">

  <h2 id="panelTitle">Panel</h2>

  <div id="menu"></div>

  <div id="content"></div>

</div>

<script>
const supabaseUrl = "https://muckmihrgifzxazghngw.supabase.co";
const supabaseKey = "TU_KEY";
const supabase = supabase.createClient(supabaseUrl, supabaseKey);

let user = null;
let profile = null;
let selectedArtist = null;

/* ================= AUTH ================= */

async function auth(){

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const msg = document.getElementById("msg");

  if(!email || !password){
    msg.innerText = "Completa todo";
    return;
  }

  const login = await supabase.auth.signInWithPassword({
    email, password
  });

  if(!login.error){
    user = login.data.user;
    await loadProfile();
    startApp();
    return;
  }

  const signup = await supabase.auth.signUp({
    email, password
  });

  if(signup.error){
    msg.innerText = signup.error.message;
    return;
  }

  msg.innerText = "Usuario creado. Revisa email o vuelve a entrar.";
}

async function resetPassword(){
  const email = document.getElementById("email").value;

  await supabase.auth.resetPasswordForEmail(email);
  alert("Mail enviado");
}

/* ================= SESSION ================= */

async function loadSession(){
  const { data } = await supabase.auth.getUser();

  if(data.user){
    user = data.user;
    await loadProfile();
    startApp();
  }
}
loadSession();

async function loadProfile(){

  const { data } = await supabase
    .from("profiles")
    .select("*")
    .eq("id", user.id)
    .single();

  profile = data;
}

/* ================= APP START ================= */

function startApp(){
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";

  if(profile.role === "admin"){
    loadAdmin();
  } else {
    loadTattoo();
  }
}

/* ================= PANELS ================= */

async function loadAdmin(){
  document.getElementById("panelTitle").innerText = "Admin Panel";

  document.getElementById("menu").innerHTML = `
    <button onclick="loadArtistsTabs()">🎨 Tatuadores</button>
    <button onclick="showCalendar()">📅 Calendario</button>
    <button onclick="loadAppointments()">📋 Turnos</button>
    <button onclick="showClients()">👤 Clientes</button>
    <button onclick="showPayments()">💰 Pagos</button>
    <button onclick="showFilters()">🔎 Filtros</button>
  `;
}

function loadTattoo(){
  document.getElementById("panelTitle").innerText = "Tatuador Panel";

  document.getElementById("menu").innerHTML = `
    <button onclick="showCalendar()">📅 Mi agenda</button>
    <button onclick="loadAppointments()">📋 Turnos</button>
  `;
}

/* ================= ARTISTS ================= */

async function loadArtistsTabs(){

  const { data } = await supabase.from("artists").select("*");

  let html = `<div class="tabs">`;

  html += `<button onclick="selectArtist(null)">Todos</button>`;

  data.forEach(a=>{
    html += `<button onclick="selectArtist('${a.id}')">${a.name}</button>`;
  });

  html += `</div>`;

  document.getElementById("content").innerHTML = html;

  showCalendar();
}

function selectArtist(id){
  selectedArtist = id;
  showCalendar();
}

/* ================= CALENDAR ================= */

function showCalendar(){

  let html = "<h3>📅 Calendario</h3><div class='calendar'>";

  for(let i=1;i<=30;i++){
    html += `<div class='day' onclick="openDay(${i})">Día ${i}</div>`;
  }

  html += "</div>";

  document.getElementById("content").innerHTML = html;
}

/* ================= OPEN DAY ================= */

async function openDay(day){

  let query = supabase
    .from("appointments")
    .select("*")
    .eq("date", "Dia " + day);

  if(selectedArtist){
    query = query.eq("artist_id", selectedArtist);
  }

  const { data } = await query;

  document.getElementById("content").innerHTML = `
    <h3>📅 Día ${day}</h3>

    <input id="client" placeholder="Cliente">
    <input id="time" placeholder="Hora (10:15)">
    <br>

    <button onclick="saveAppointment(${day})">Guardar</button>
    <button onclick="showCalendar()">Volver</button>

    <hr>
    <div id="list"></div>
  `;

  renderDay(data);
}

/* ================= RENDER DAY ================= */

function renderDay(data){

  let html = "";

  data.forEach(t=>{
    html += `
      <div class="card">
        <b>${t.client}</b><br>
        ${t.time} - ${t.artist_name}<br>
        <span class="${t.status}">${t.status}</span><br>

        <button onclick="editTurn('${t.id}','${t.client}','${t.time}','${t.artist_name}','${t.status}')">
          Editar
        </button>
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

/* ================= SAVE ================= */

async function saveAppointment(day){

  const client = document.getElementById("client").value;
  const time = document.getElementById("time").value;

  const { data: artist } = await supabase
    .from("artists")
    .select("*")
    .eq("id", selectedArtist)
    .single();

  await supabase.from("appointments").insert([{
    user_id: user.id,
    client,
    date: "Dia " + day,
    time,
    artist_id: selectedArtist,
    artist_name: artist ? artist.name : "Sin asignar",
    status: "pending"
  }]);

  openDay(day);
}

/* ================= EDIT ================= */

function editTurn(id, client, time, artist, status){

  document.getElementById("content").innerHTML = `
    <h3>Editar</h3>

    <input id="e_client" value="${client}">
    <input id="e_time" value="${time}">
    <input id="e_artist" value="${artist}">
    <input id="e_status" value="${status}">

    <button onclick="saveEdit('${id}')">Guardar</button>
    <button onclick="loadAppointments()">Cancelar</button>
  `;
}

async function saveEdit(id){

  await supabase.from("appointments")
    .update({
      client: document.getElementById("e_client").value,
      time: document.getElementById("e_time").value,
      artist_name: document.getElementById("e_artist").value,
      status: document.getElementById("e_status").value
    })
    .eq("id", id);

  loadAppointments();
}

/* ================= LIST ================= */

async function loadAppointments(){

  const { data } = await supabase
    .from("appointments")
    .select("*")
    .eq("user_id", user.id);

  let html = "<h3>Turnos</h3>";

  data.forEach(t=>{
    html += `
      <div class="card">
        <b>${t.client}</b><br>
        ${t.date} - ${t.time}<br>
        ${t.artist_name}<br>
        <span class="${t.status}">${t.status}</span>
      </div>
    `;
  });

  document.getElementById("content").innerHTML = html;
}

/* ================= CLIENTS ================= */

function showClients(){
  document.getElementById("content").innerHTML = `
    <h3>Clientes</h3>
    <input id="name">
    <input id="phone">
    <button onclick="saveClient()">Guardar</button>
  `;
}

async function saveClient(){
  await supabase.from("clients").insert([{
    user_id: user.id,
    name: document.getElementById("name").value,
    phone: document.getElementById("phone").value
  }]);
}

/* ================= PAYMENTS ================= */

function showPayments(){
  document.getElementById("content").innerHTML = `
    <h3>Pagos</h3>
    <input id="client">
    <input id="amount">
    <button onclick="savePayment()">Guardar</button>
  `;
}

async function savePayment(){
  await supabase.from("payments").insert([{
    user_id: user.id,
    client: document.getElementById("client").value,
    amount: document.getElementById("amount").value,
    status: "pending"
  }]);
}

/* ================= FILTERS ================= */

function showFilters(){
  document.getElementById("content").innerHTML = `
    <h3>Filtros</h3>
    <input id="f_date">
    <input id="f_artist">
    <button onclick="applyFilters()">Buscar</button>
  `;
}

async function applyFilters(){

  let date = document.getElementById("f_date").value;
  let artist = document.getElementById("f_artist").value;

  let query = supabase.from("appointments").select("*");

  if(date) query = query.eq("date", date);
  if(artist) query = query.eq("artist_name", artist);

  const { data } = await query;

  let html = "<h3>Resultados</h3>";

  data.forEach(t=>{
    html += `<div class="card">${t.client} - ${t.time}</div>`;
  });

  document.getElementById("content").innerHTML = html;
}
</script>

</body>
</html>
