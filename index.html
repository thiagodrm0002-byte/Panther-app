<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panther Studio</title>
</head>
<body style="background-color: #111111; color: white; font-family: sans-serif; margin: 0; padding: 20px;">

    <div style="background-color: #1A1A1A; padding: 20px; border-radius: 16px; border: 1px solid #333;">
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <div style="display: flex; gap: 15px; font-weight: bold;">
                <span>&lt;</span>
                <span>Mayo 2025</span>
                <span>&gt;</span>
            </div>
            <button style="background: transparent; color: white; border: 1px solid #444; padding: 5px 15px; border-radius: 6px;">Hoy</button>
        </div>

        <div style="display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; color: #666; font-size: 0.8rem; margin-bottom: 10px;">
            <span>LUN</span><span>MAR</span><span>MIÉ</span><span>JUE</span><span>VIE</span><span>SÁB</span><span>DOM</span>
        </div>

    </div>

</body>
</html>
