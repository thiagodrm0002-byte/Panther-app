<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Panther SaaS Studio</title>

<link rel="stylesheet" href="styles.css">
</head>

<body>

<div id="app">

<!-- SIDEBAR -->
<div class="sidebar">

<div class="logo">🐆 PANTHER</div>

<button onclick="showView('calendar')">📅 Turnos</button>
<button onclick="showView('clients')">👤 Clientes</button>
<button onclick="showView('payments')">💰 Pagos</button>
<button onclick="showView('team')">🎨 Equipo</button>

<div class="user">
<span id="userRole">Owner</span>
</div>

</div>

<!-- MAIN -->
<div class="main">

<!-- CALENDAR -->
<div id="calendarView" class="view active">

<div class="topbar">
<button onclick="prevMonth()">‹</button>
<h2 id="monthTitle"></h2>
<button onclick="nextMonth()">›</button>
</div>

<div id="calendarGrid"></div>

</div>

<!-- CLIENTS -->
<div id="clientsView" class="view">
<h2>Clientes</h2>
<div id="clientsList"></div>
</div>

<!-- PAYMENTS -->
<div id="paymentsView" class="view">
<h2>Pagos</h2>
<div id="paymentsList"></div>
</div>

<!-- TEAM -->
<div id="teamView" class="view">
<h2>Equipo</h2>

<input id="newArtist" placeholder="Nuevo tatuador">
<button onclick="addArtist()">Agregar</button>

<div id="artistsList"></div>
</div>

</div>

<!-- AGENDA -->
<div class="agenda">

<h2 id="selectedDay">Día</h2>

<button onclick="openModal()">+ Nuevo turno</button>

<div id="appointmentsList"></div>

</div>

</div>

<!-- MODAL -->
<div id="modal">
<div class="modal">

<input id="client" placeholder="Cliente">
<input id="time" placeholder="Hora">

<select id="artistSelect"></select>

<select id="status">
<option value="green">Disponible</option>
<option value="yellow">Seña</option>
<option value="red">Ocupado</option>
</select>

<button onclick="saveAppointment()">Guardar</button>
<button onclick="closeModal()">Cerrar</button>

</div>
</div>

<script src="app.js"></script>

</body>
</html>
