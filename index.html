<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panther Studio</title>

<link rel="stylesheet" href="styles.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="loginBox">
    <h1>🐆 Panther Studio</h1>

    <input id="username" placeholder="Usuario">
    <input id="password" type="password" placeholder="Contraseña">

    <button onclick="login()">Entrar</button>
  </div>
</div>

<!-- APP -->
<div id="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>PANTHER</h2>

    <button onclick="showCalendar()">📅 Turnos</button>
    <button onclick="showClients()">👤 Clientes</button>
    <button onclick="showPayments()">💰 Pagos</button>
    <button onclick="showArtists()">🎨 Equipo</button>
    <button onclick="logout()">Salir</button>

    <div class="role" id="role"></div>
  </div>

  <!-- CALENDARIO -->
  <div class="calendarPanel">
    <div id="calendarHeader"></div>
    <div id="calendar"></div>
  </div>

  <!-- AGENDA -->
  <div class="agendaPanel">
    <div class="agendaHeader">
      <h3 id="dayTitle">Agenda</h3>
      <button onclick="openModal()">+ Nuevo turno</button>
    </div>

    <div id="agenda"></div>
  </div>

</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modalBox">
    <h3>Nuevo Turno</h3>

    <input id="m_client" placeholder="Cliente">
    <input id="m_time" placeholder="Hora 14:15">
    <input id="m_artist" placeholder="Tatuador">
    <input id="m_deposit" placeholder="Seña">

    <button onclick="saveTurn()">Guardar</button>
    <button onclick="closeModal()">Cerrar</button>
  </div>
</div>

<script src="app.js"></script>

</body>
</html>
