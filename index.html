<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Panther Studio</title>

<link rel="stylesheet" href="styles.css">
</head>

<body>

<div id="app">

<!-- SIDEBAR -->
<div class="sidebar">

<div class="logo">🐆 PANTHER</div>

<button onclick="renderCalendar()">📅 Turnos</button>
<button>👤 Clientes</button>
<button>💰 Pagos</button>
<button>🎨 Equipo</button>

<div class="userBox">
Titi<br>
Recepción
</div>

</div>

<!-- CALENDAR -->
<div class="calendar">

<div class="topBar">
<button onclick="prevMonth()"><</button>
<h2 id="monthTitle"></h2>
<button onclick="nextMonth()">></button>
</div>

<div class="week">
<div>Lun</div><div>Mar</div><div>Mié</div>
<div>Jue</div><div>Vie</div><div>Sáb</div><div>Dom</div>
</div>

<div id="calendarGrid"></div>

</div>

<!-- AGENDA -->
<div class="agenda">

<div class="agendaHeader">
<h2 id="selectedDay">Día</h2>
<button onclick="openModal()">+ Nuevo turno</button>
</div>

<div id="agendaList"></div>

</div>

</div>

<!-- MODAL -->
<div id="modal">
<div class="modal">

<h3>Nuevo Turno</h3>

<input id="client" placeholder="Cliente">
<input id="time" placeholder="Hora 14:15">
<input id="artist" placeholder="Tatuador">
<input id="deposit" placeholder="Seña">

<button onclick="save()">Guardar</button>
<button onclick="closeModal()">Cerrar</button>

</div>
</div>

<script src="app.js"></script>

</body>
</html>
