<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Panther SaaS</title>

<link rel="stylesheet" href="styles.css">
</head>

<body>

<div id="app">

<!-- SIDEBAR -->
<aside class="sidebar">

<div class="logo">Panther Tatto</div>

<button onclick="renderCalendar()">📅 Calendario</button>
<button onclick="addArtist()">🎨 Tatuadores</button>
<button onclick="showClients()">👤 Clientes</button>


<div id="artistList"></div>

<div class="user">
Titi (Owner)
</div>

</aside>

<!-- CALENDARIO -->
<section class="calendar">

<div class="top">
<button onclick="prevMonth()">‹</button>
<h2 id="monthTitle"></h2>
<button onclick="nextMonth()">›</button>
</div>

<div class="week">
<div>L</div><div>M</div><div>M</div><div>J</div><div>V</div><div>S</div><div>D</div>
</div>

<div id="calendarGrid"></div>

</section>

<!-- AGENDA -->
<aside class="agenda">

<h2 id="selectedDay">Seleccioná un día</h2>

<button onclick="openModal()">+ Nuevo turno</button>

<div id="agendaList"></div>

</aside>

</div>

<!-- MODAL -->
<div id="modal">

<div class="modal">

<h3>Nuevo Turno</h3>

<input id="client" placeholder="Cliente">
<input id="time" placeholder="Hora 14:15">

<select id="artistSelect"></select>

<select id="status">
<option value="green">Disponible</option>
<option value="yellow">Seña</option>
<option value="red">Ocupado</option>
</select>

<button onclick="save()">Guardar</button>
<button onclick="closeModal()">Cerrar</button>

</div>

</div>

<script src="app.js"></script>

</body>
</html>
