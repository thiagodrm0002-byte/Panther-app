<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Panther Studio</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div id="app">

<!-- LOGIN -->
<div id="loginView">
<h2>🐆 Panther Studio</h2>

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">

<button onclick="login()">Entrar</button>
</div>

<!-- APP -->
<div id="mainApp" style="display:none">

<div class="topbar">
<h3 id="monthTitle"></h3>
</div>

<div class="calendar">
<div id="calendarGrid"></div>
</div>

<div class="agenda">
<h3 id="selectedDay">Día</h3>

<button onclick="openModal()">+ Turno</button>

<div id="appointments"></div>
</div>

</div>

<!-- MODAL -->
<div id="modal">
<div class="modal">

<input id="client">
<input id="time">

<select id="artist"></select>

<select id="status">
<option value="green">Disponible</option>
<option value="yellow">Seña</option>
<option value="red">Ocupado</option>
</select>

<button onclick="save()">Guardar</button>
<button onclick="closeModal()">Cerrar</button>

</div>
</div>

<script src="app.js"></script>

</body>
</html>
