<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panther Tattoo SaaS</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0a0a0a;
  color:#f5c542;
  text-align:center;
}

#app{display:none;}

button{
  padding:10px;
  margin:5px;
  border-radius:10px;
  border:none;
  background:#1c1c1c;
  color:#f5c542;
  cursor:pointer;
}

button:hover{background:#333;}

input{
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
}

.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
  padding:10px;
}

.day{
  background:#1c1c1c;
  padding:15px;
  border-radius:10px;
  cursor:pointer;
}

.card{
  background:#1c1c1c;
  margin:10px auto;
  width:80%;
  padding:15px;
  border-radius:10px;
  text-align:left;
}

.pending{color:#ffcc00;}
.ok{color:#00ff88;}
</style>
</head>

<body>

<h1>🐆 PANTHER SAAS</h1>

<!-- LOGIN -->
<div id="login">
  <input id="email" placeholder="Email"><br>
  <input id="password" type="password" placeholder="Password"><br>
  <button onclick="login()">Entrar</button>
</div>

<!-- APP -->
<div id="app">

  <h2>Panel Empresa</h2>

  <button onclick="showCalendar()">📅 Turnos</button>
  <button onclick="showClients()">👤 Clientes</button>
  <button onclick="showPayments()">💰 Pagos</button>
  <button onclick="loadAppointments()">📋 Ver Turnos</button>

  <div id="content"></div>

</div>

<script>
const supabaseUrl = "https://muckmihrgifzxazghngw.supabase.co";
const supabaseKey = "sb_publishable_wNdAJjCUenMzrYSWMelwHw_-mbvowyW";
const supabase = supabase.createClient(supabaseUrl, supabaseKey);

let user = null;

// LOGIN REAL
async function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await supabase.auth.signInWithPassword({
    email,
    password
  });

  if(error){
    alert("Error login");
    return;
  }

  user = data.user;

  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";

  showCalendar();
}

// CALENDARIO
function showCalendar(){
  const c = document.getElementById("content");

  let html = "<h3>📅 Calendario Empresa</h3><div class='calendar'>";

  for(let i=1;i<=30;i++){
    html += `<div class='day' onclick="openDay(${i})">${i}</div>`;
  }

  html += "</div>";

  c.innerHTML = html;
}

// DIA
function openDay(day){
  const c = document.getElementById("content");

  c.innerHTML = `
    <h3>📅 Día ${day}</h3>

    <input id="client" placeholder="Cliente"><br>
    <input id="time" placeholder="Hora"><br>

    <button onclick="saveAppointment(${day})">Guardar turno</button>
    <button onclick="showCalendar()">Volver</button>
  `;
}

// GUARDAR TURNO (EMPRESA)
async function saveAppointment(day){
  const client = document.getElementById("client").value;
  const time = document.getElementById("time").value;

  await supabase.from("appointments").insert([{
    user_id: user.id,
    client,
    date: "Dia " + day,
    time,
    status:"pendiente"
  }]);

  alert("Guardado");
  showCalendar();
}

// VER TURNOS
async function loadAppointments(){
  const c = document.getElementById("content");

  const { data } = await supabase
    .from("appointments")
    .select("*")
    .eq("user_id", user.id);

  let html = "<h3>📋 Turnos</h3>";

  data.forEach(t=>{
    html += `
      <div class="card">
        <b>${t.client}</b><br>
        ${t.date} - ${t.time}<br>
        <span class="pending">${t.status}</span>
      </div>
    `;
  });

  c.innerHTML = html;
}

// CLIENTES
async function showClients(){
  const c = document.getElementById("content");

  c.innerHTML = `
    <h3>👤 Clientes</h3>
    <input id="name" placeholder="Nombre"><br>
    <input id="phone" placeholder="Tel"><br>
    <button onclick="saveClient()">Guardar</button>
  `;
}

async function saveClient(){
  await supabase.from("clients").insert([{
    user_id: user.id,
    name: document.getElementById("name").value,
    phone: document.getElementById("phone").value
  }]);

  alert("Cliente guardado");
}

// PAGOS
async function showPayments(){
  const c = document.getElementById("content");

  c.innerHTML = `
    <h3>💰 Pagos</h3>
    <input id="client" placeholder="Cliente"><br>
    <input id="amount" placeholder="Monto"><br>
    <button onclick="savePayment()">Guardar</button>
  `;
}

async function savePayment(){
  await supabase.from("payments").insert([{
    user_id: user.id,
    client: document.getElementById("client").value,
    amount: document.getElementById("amount").value,
    status:"pendiente"
  }]);

  alert("Pago guardado");
}
</script>

</body>
</html>
