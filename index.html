<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Styles.css">
    <title>Panther Studio</title>
</head>
<body>

    <div class="main-layout">
        <div id="calendario-container">
            <h2>Junio 2026</h2>
           <div id="grid-dias" style="display: grid; grid-template-columns: repeat(7, 1fr); border-top: 1px solid #333; border-left: 1px solid #333; margin-top: 15px;">
    <span style="padding: 10px; border-right: 1px solid #333; border-bottom: 1px solid #333; color: #666; font-size: 0.7rem;">LUN</span>
    <span style="padding: 10px; border-right: 1px solid #333; border-bottom: 1px solid #333; color: #666; font-size: 0.7rem;">MAR</span>
    <span style="padding: 10px; border-right: 1px solid #333; border-bottom: 1px solid #333; color: #666; font-size: 0.7rem;">MIÉ</span>
    <span style="padding: 10px; border-right: 1px solid #333; border-bottom: 1px solid #333; color: #666; font-size: 0.7rem;">JUE</span>
    <span style="padding: 10px; border-right: 1px solid #333; border-bottom: 1px solid #333; color: #666; font-size: 0.7rem;">VIE</span>
    <span style="padding: 10px; border-right: 1px solid #333; border-bottom: 1px solid #333; color: #666; font-size: 0.7rem;">SÁB</span>
    <span style="padding: 10px; border-right: 1px solid #333; border-bottom: 1px solid #333; color: #666; font-size: 0.7rem;">DOM</span>

    <script>
        for (let i = 1; i <= 31; i++) {
            document.write(`
                <div class="dia-celda" onclick="verAgenda(this, ${i})" style="padding: 15px 5px; border-right: 1px solid #333; border-bottom: 1px solid #333; cursor: pointer; text-align: center;">
                    <span style="color: white; display: block;">${i}</span>
                    <div style="display: flex; justify-content: center; gap: 4px; margin-top: 8px;">
                        <div style="width: 6px; height: 6px; background-color: #22C55E; border-radius: 50%;"></div>
                    </div>
                </div>
            `);
        }
    </script>
</div>


        <div id="panel-turnos">
            <h2 id="titulo-agenda">Agenda del día</h2>
            <button onclick="abrirModal()" class="btn-nuevo">+ Nuevo Turno</button>
            <div id="lista-turnos">
                <p>Selecciona un día para ver turnos</p>
            </div>
        </div>
    </div>

    <div id="modal-turno" class="modal">
        <div class="modal-content">
            <h3>Nuevo Turno</h3>
            <input type="text" placeholder="Nombre Cliente">
            <select id="select-tatuador">
                <option>Seleccionar Tatuador</option>
            </select>
            <select id="select-estado">
                <option value="verde">Estado: Disponible</option>
                <option value="amarillo">Estado: Seña</option>
                <option value="rojo">Estado: Ocupado</option>
            </select>
            <input type="number" placeholder="Monto Seña">
            <button onclick="cerrarModal()" class="btn-guardar">Guardar Turno</button>
        </div>
    </div>

    <script>
        function verAgenda(el, dia) { 
            document.getElementById('titulo-agenda').innerText = "Agenda del " + dia + " de Junio"; 
        }
        function abrirModal() { document.getElementById('modal-turno').style.display = 'flex'; }
        function cerrarModal() { document.getElementById('modal-turno').style.display = 'none'; }
    </script>
</body>
</html>
