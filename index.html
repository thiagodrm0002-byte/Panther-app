<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panther Studio SaaS</title>

<link rel="stylesheet" href="styles.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="loginCard">
    <h1>🐆 Panther Studio</h1>

    <input id="username" placeholder="Usuario">
    <input id="password" type="password" placeholder="Contraseña">

    <button onclick="login()">Entrar</button>
  </div>
</div>

<!-- APP -->
<div id="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>PANTHER</h2>

    <button onclick="renderCalendar()">📅 Turnos</button>
    <button onclick="alert('Clientes')">👤 Clientes</button>
    <button onclick="alert('Pagos')">💰 Pagos</button>
    <button onclick="alert('Equipo')">🎨 Equipo</button>
    <button onclick="logout()">Salir</button>

    <div id="roleTag"></div>
  </div>

  <!-- CALENDARIO -->
  <div class="calendar">
    <div id="monthHeader"></div>
    <div id="grid"></div>
  </div>

  <!-- AGENDA -->
  <div class="agenda">
    <div class="agendaHeader">
      <h3 id="dayTitle">Agenda</h3>
      <button onclick="openModal()">+ Nuevo turno</button>
    </div>

    <div id="agendaList"></div>
  </div>

</div>

<!-- MODAL -->
<div id="modal">
  <div class="modalBox">
    <h3>Nuevo Turno</h3>

    <input id="m_client" placeholder="Cliente">
    <input id="m_time" placeholder="Hora 14:15">
    <input id="m_artist" placeholder="Tatuador">
    <input id="m_deposit" placeholder="Seña">

    <button onclick="saveTurn()">Guardar</button>
    <button onclick="closeModal()">Cerrar</button>
  </div>
</div>

<script src="app.js"></script>

</body>
</html>
