<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panther Studio SaaS</title>

<link rel="stylesheet" href="styles.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body>

<!-- LOGIN -->
<div id="auth">
  <div class="loginBox">
    <h1>🐆 Panther Studio</h1>

    <input id="username" placeholder="Usuario">
    <input id="password" type="password" placeholder="Contraseña">

    <button onclick="login()">Entrar</button>

    <p id="msg"></p>
  </div>
</div>

<!-- APP -->
<div id="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>PANTHER</h2>

    <button onclick="showCalendar()">📅 Turnos</button>
    <button onclick="showClients()">👤 Clientes</button>
    <button onclick="showPayments()">💰 Pagos</button>
    <button onclick="showArtists()">🎨 Equipo</button>
    <button onclick="logout()">Salir</button>

    <div class="role" id="roleBox"></div>
  </div>

  <!-- CALENDARIO -->
  <div class="main">
    <div id="calendar"></div>
  </div>

  <!-- AGENDA -->
  <div class="right">
    <h3 id="dayTitle">Agenda</h3>
    <div id="agenda"></div>

    <button onclick="openModal()">+ Nuevo turno</button>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
