<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panther Tattoo SaaS</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0a0a0a;
  color:#f5c542;
  text-align:center;
}

#app{display:none;}

button{
  padding:10px;
  margin:5px;
  border-radius:10px;
  border:none;
  background:#1c1c1c;
  color:#f5c542;
  cursor:pointer;
}

button:hover{background:#333;}

input{
  padding:10px;
  margin:5px;
  border-radius:8px;
  border:none;
}

.calendar{
  display:grid;
  grid-template-columns:repeat(7,1fr);
  gap:6px;
  padding:10px;
}

.day{
  background:#1c1c1c;
  padding:15px;
  border-radius:10px;
  cursor:pointer;
}

.card{
  background:#1c1c1c;
  margin:10px auto;
  width:80%;
  padding:15px;
  border-radius:10px;
  text-align:left;
}

.pending{color:#f5c542;}
.booked{color:#ff4d4d;}
.free{color:#4dff88;}
</style>
</head>

<body>

<h1>🐆 PANTHER SAAS</h1>

<!-- LOGIN -->
<div id="login">
  <input id="email" placeholder="Email"><br>
  <input id="password" type="password" placeholder="Password"><br>
  <button onclick="login()">Entrar</button>
</div>

<!-- APP -->
<div id="app">

  <h2>Panel Empresa</h2>

  <button onclick="showCalendar()">📅 Calendario</button>
  <button onclick="loadAppointments()">📋 Turnos</button>
  <button onclick="showClients()">👤 Clientes</button>
  <button onclick="showPayments()">💰 Pagos</button>
  <button onclick="showFilters()">🔎 Filtros</button>

  <div id="content"></div>

</div>

<script>
const supabaseUrl = "https://muckmihrgifzxazghngw.supabase.co";
const supabaseKey = "sb_publishable_wNdAJjCUenMzrYSWMelwHw_-mbvowyW";
const supabase = supabase.createClient(supabaseUrl, supabaseKey);

let user = null;

/* ---------------- LOGIN ---------------- */
async function login(){
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await supabase.auth.signInWithPassword({
    email,
    password
  });

  if(error){
    alert("Error login");
    return;
  }

  user = data.user;

  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";

  showCalendar();
}

/* ---------------- CALENDARIO ---------------- */
function showCalendar(){
  const c = document.getElementById("content");

  let html = "<h3>📅 Calendario</h3><div class='calendar'>";

  for(let i=1;i<=30;i++){
    html += `<div class='day' onclick="openDay(${i})">Día ${i}</div>`;
  }

  html += "</div>";

  c.innerHTML = html;
}

/* ---------------- OPEN DAY ---------------- */
async function openDay(day){
  const c = document.getElementById("content");

  const { data } = await supabase
    .from("appointments")
    .select("*")
    .eq("date", "Dia " + day);

  c.innerHTML = `
    <h3>📅 Día ${day}</h3>

    <input id="client" placeholder="Cliente"><br>
    <input id="time" placeholder="Hora (10:15 / 18:40)"><br>
    <input id="artist" placeholder="Tatuador"><br>

    <button onclick="saveAppointment(${day})">Guardar turno</button>
    <button onclick="showCalendar()">Volver</button>

    <hr>
    <div id="list"></div>
  `;

  renderDay(data);
}

/* ---------------- RENDER DAY ---------------- */
function renderDay(data){

  let html = "";

  data.forEach(t=>{
    html += `
      <div class="card">
        <b>${t.client}</b><br>
        ${t.time} - ${t.artist}<br>
        <span class="${t.status}">${t.status}</span><br>

        <button onclick="editTurn('${t.id}','${t.client}','${t.time}','${t.artist}','${t.status}')">
          Editar
        </button>
      </div>
    `;
  });

  document.getElementById("list").innerHTML = html;
}

/* ---------------- SAVE ---------------- */
async function saveAppointment(day){

  const client = document.getElementById("client").value;
  const time = document.getElementById("time").value;
  const artist = document.getElementById("artist").value;

  await supabase.from("appointments").insert([{
    user_id: user.id,
    client,
    date: "Dia " + day,
    time,
    artist,
    status: "pending"
  }]);

  openDay(day);
}

/* ---------------- EDIT ---------------- */
function editTurn(id, client, time, artist, status){

  const c = document.getElementById("content");

  c.innerHTML = `
    <h3>Editar Turno</h3>

    <input id="e_client" value="${client}">
    <input id="e_time" value="${time}">
    <input id="e_artist" value="${artist}">
    <input id="e_status" value="${status}">

    <button onclick="saveEdit('${id}')">Guardar</button>
    <button onclick="loadAppointments()">Cancelar</button>
  `;
}

/* ---------------- SAVE EDIT ---------------- */
async function saveEdit(id){

  await supabase.from("appointments")
    .update({
      client: document.getElementById("e_client").value,
      time: document.getElementById("e_time").value,
      artist: document.getElementById("e_artist").value,
      status: document.getElementById("e_status").value
    })
    .eq("id", id);

  loadAppointments();
}

/* ---------------- LIST ---------------- */
async function loadAppointments(){

  const { data } = await supabase
    .from("appointments")
    .select("*")
    .eq("user_id", user.id);

  let html = "<h3>📋 Turnos</h3>";

  data.forEach(t=>{
    html += `
      <div class="card">
        <b>${t.client}</b><br>
        ${t.date} - ${t.time}<br>
        ${t.artist}<br>
        <span class="${t.status}">${t.status}</span>
      </div>
    `;
  });

  document.getElementById("content").innerHTML = html;
}

/* ---------------- CLIENTS ---------------- */
function showClients(){
  document.getElementById("content").innerHTML = `
    <h3>Clientes</h3>
    <input id="name" placeholder="Nombre">
    <input id="phone" placeholder="Tel">
    <button onclick="saveClient()">Guardar</button>
  `;
}

async function saveClient(){
  await supabase.from("clients").insert([{
    user_id: user.id,
    name: document.getElementById("name").value,
    phone: document.getElementById("phone").value
  }]);

  alert("Cliente guardado");
}

/* ---------------- PAYMENTS ---------------- */
function showPayments(){
  document.getElementById("content").innerHTML = `
    <h3>Pagos</h3>
    <input id="client" placeholder="Cliente">
    <input id="amount" placeholder="Monto">
    <button onclick="savePayment()">Guardar</button>
  `;
}

async function savePayment(){
  await supabase.from("payments").insert([{
    user_id: user.id,
    client: document.getElementById("client").value,
    amount: document.getElementById("amount").value,
    status: "pending"
  }]);

  alert("Pago guardado");
}

/* ---------------- FILTERS ---------------- */
function showFilters(){
  document.getElementById("content").innerHTML = `
    <h3>Filtros</h3>

    <input id="f_date" placeholder="Dia">
    <input id="f_artist" placeholder="Tatuador">

    <button onclick="applyFilters()">Buscar</button>
  `;
}

async function applyFilters(){

  let date = document.getElementById("f_date").value;
  let artist = document.getElementById("f_artist").value;

  let query = supabase.from("appointments").select("*");

  if(date) query = query.eq("date", date);
  if(artist) query = query.eq("artist", artist);

  const { data } = await query;

  let html = "<h3>Resultados</h3>";

  data.forEach(t=>{
    html += `<div class="card">${t.client} - ${t.time}</div>`;
  });

  document.getElementById("content").innerHTML = html;
}
</script>

</body>
</html>
